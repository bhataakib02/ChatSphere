spring:
  application:
    name: chatsphere-backend-test
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:chatspheretest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  task:
    scheduling:
      enabled: false

server:
  port: 0

jwt:
  secret: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiBhbmQgdmFsaWRhdGlvbg==
  expiration-ms: 86400000

app:
  cors:
    allowed-origin-patterns: http://localhost:5173

logging:
  level:
    root: WARN
