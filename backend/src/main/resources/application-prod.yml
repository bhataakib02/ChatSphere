spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    # Small managed Postgres (Aiven free/hobby, etc.) often allows very few connections.
    # Override on Render if your plan allows more: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=10
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:4}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.security: WARN
