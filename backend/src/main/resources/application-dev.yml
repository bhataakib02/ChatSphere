# Local development. Prefer docker-compose Postgres (see repo root).
spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    url: ${DB_URL:jdbc:postgresql://chatsphere-db-retailapp02.a.aivencloud.com:13259/defaultdb?sslmode=require}
    username: ${DB_USER:avnadmin}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 5

jwt:
  # Dev-only default (Base64, 256+ bits when decoded). Override with JWT_SECRET in any shared environment.
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiBhbmQgdmFsaWRhdGlvbg==}

logging:
  level:
    org.springframework.security: DEBUG
