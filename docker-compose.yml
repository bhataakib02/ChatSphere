services:
  postgres:
    image: postgres:15-alpine
    container_name: chatsphere-postgres
    environment:
      POSTGRES_DB: chatsphere
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - chatsphere_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatsphere"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chatsphere_pgdata:
