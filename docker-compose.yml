services:
  postgres:
    image: postgres:15-alpine
    container_name: chatsphere-postgres
    environment:
      POSTGRES_DB: chatsphere
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - chatsphere_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatsphere"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles: ["stack"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatsphere-backend
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres:5432/chatsphere
      DB_USER: postgres
      DB_PASSWORD: postgres
      # First-time schema when using prod (validate would fail on empty DB). Dev already uses update.
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    profiles: ["stack"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatsphere-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  chatsphere_pgdata:
